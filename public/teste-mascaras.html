<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Máscaras Alpine.js</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8">
    <h1 class="text-2xl font-bold mb-4">Teste de Máscaras Alpine.js</h1>

    <div class="space-y-4 max-w-md">
        <div>
            <label class="block text-sm font-medium text-gray-700">CPF</label>
            <input type="text" x-mask="999.999.999-99" placeholder="000.000.000-00" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:border-blue-500 focus:ring-blue-500">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">Telefone</label>
            <input type="text" x-mask="(99) 99999-9999" placeholder="(00) 00000-0000" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:border-blue-500 focus:ring-blue-500">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">CEP</label>
            <input type="text" x-mask="99999-999" placeholder="00000-000" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:border-blue-500 focus:ring-blue-500">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">CNPJ</label>
            <input type="text" x-mask="99.999.999/9999-99" placeholder="00.000.000/0000-00" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:border-blue-500 focus:ring-blue-500">
        </div>
    </div>

    <!-- Alpine.js -->
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Alpine.js Mask Plugin -->
    <script src="https://unpkg.com/@alpinejs/mask@3.x.x/dist/cdn.min.js"></script>
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.plugin(AlpineMask);
        });
    </script>
</body>
</html>
